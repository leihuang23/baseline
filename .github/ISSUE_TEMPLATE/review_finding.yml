name: Review finding
description: Capture a manual review finding that may be assigned to Copilot.
title: "review: "
body:
  - type: textarea
    id: finding
    attributes:
      label: Finding
      description: What did review find?
      placeholder: State the issue plainly, with file paths or PR links when possible.
    validations:
      required: true
  - type: textarea
    id: desired_outcome
    attributes:
      label: Desired outcome
      description: What should be true after the fix?
      placeholder: Describe the acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: suggested_verification
    attributes:
      label: Suggested verification
      description: Which checks should prove the fix?
      placeholder: |
        - uv run pytest ...
        - npm test --prefix apps/dashboard
        - swift test --package-path apps/ios
    validations:
      required: false
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options:
        - Privacy/safety critical
        - User-facing behavior
        - Data/schema/migration
        - CI/tooling
        - Documentation only
    validations:
      required: true
  - type: checkboxes
    id: copilot_notes
    attributes:
      label: Copilot assignment notes
      options:
        - label: This issue is small enough to assign to Copilot as one PR.
          required: true
        - label: The issue includes enough context for Copilot without reading the historical tasks folder.
          required: true
        - label: The issue avoids private health data, secrets, and unredacted logs.
          required: true
