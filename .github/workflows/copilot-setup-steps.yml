name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".github/copilot-instructions.md"
      - "pyproject.toml"
      - "uv.lock"
      - "apps/dashboard/package.json"
      - "apps/ios/Package.swift"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - ".github/copilot-instructions.md"
      - "pyproject.toml"
      - "uv.lock"
      - "apps/dashboard/package.json"
      - "apps/ios/Package.swift"

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: baseline
          POSTGRES_DB: baseline
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U baseline -d baseline"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg://baseline@localhost:5432/baseline
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: uv sync --all-groups
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Prime validation commands
        run: |
          uv run python --version
          uv run ruff --version
          uv run mypy --version
          node --version
          npm --version
